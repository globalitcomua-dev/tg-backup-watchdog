services:

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: backup_watchdog
      POSTGRES_USER: backup_watchdog
      POSTGRES_PASSWORD: backup_watchdog

    ports:
      - "5432:5432"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    ports:
      - "8088:8080"

    depends_on:
      - postgres